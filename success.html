<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Connected | Strata</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            /* Custom smooth transition styles */
            .transition-all-300 {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }

            @keyframes check-pop {
                0% { transform: scale(0); opacity: 0; }
                60% { transform: scale(1.15); opacity: 1; }
                100% { transform: scale(1); opacity: 1; }
            }
            @keyframes ring-pulse {
                0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.35); }
                100% { box-shadow: 0 0 0 18px rgba(34, 197, 94, 0); }
            }
            .check-circle {
                animation: check-pop 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both,
                           ring-pulse 1.6s ease-out 0.6s 1;
            }
        </style>
    </head>

<body class="bg-gradient-to-tr from-slate-900 via-blue-900 to-slate-950 min-h-screen flex items-center justify-center p-4 font-sans text-slate-100 antialiased">

    <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-8 text-center transition-all-300 hover:shadow-blue-900/30">

        <div class="flex justify-center mb-6">
            <div class="check-circle w-20 h-20 rounded-full bg-green-500/15 border border-green-400/30 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-green-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
        </div>

        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-300 to-blue-200 bg-clip-text text-transparent">
            You're Connected
        </h1>
        <p class="text-slate-400 text-sm mt-3 leading-relaxed">
            Congratulations — you've successfully connected to the Strata Manufacturing network. Enjoy your workspace.
        </p>

        <div class="pt-8">
            <a
                href="index.html"
                class="block w-full py-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-lg shadow-lg shadow-blue-600/20 cursor-pointer transition-all-300 transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-950 text-center uppercase tracking-wider text-xs"
            >
                back
            </a>
        </div>

    </div>

</body>
</html>
