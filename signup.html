<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up | Strata</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-tr from-slate-900 via-blue-900 to-slate-950 min-h-screen flex items-center justify-center p-4 font-sans text-slate-100">

    <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-8">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-400 via-indigo-300 to-blue-200 bg-clip-text text-transparent">
                Create Account
            </h1>
            <p class="text-slate-400 text-sm mt-2">Join the Strata workspace today</p>
        </div>

        <form action="SignUpServlet" method="post" class="space-y-6">

            <div>
                <label for="signup-email" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Email
                </label>
                <input
                    id="signup-email"
                    type="email"
                    name="email"
                    placeholder="Enter your email address"
                    required
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg text-white"
                />
            </div>

            <div>
                <label for="signup-password" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Password
                </label>
                <input
                    id="signup-password"
                    type="password"
                    name="password"
                    placeholder="Choose a strong password"
                    required
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg text-white"
                />
            </div>

            <div class="pt-4 space-y-3">
                <input
                    type="submit"
                    value="Submit"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg cursor-pointer"
                />

                <a
                    href="index.html"
                    class="block w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg cursor-pointer text-center"
                >
                    Back
                </a>
            </div>

        </form>
    </div>

</body>
</html>
