<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Welcome to Strata</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
            /* Custom smooth transition styles */
            .transition-all-300 {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
        </style>
    </head>
    
<body class="bg-gradient-to-tr from-slate-900 via-blue-900 to-slate-950 min-h-screen flex items-center justify-center p-4 font-sans text-slate-100 antialiased">

    <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl shadow-2xl p-8 transition-all-300 hover:shadow-blue-900/30">
        
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 via-indigo-300 to-blue-200 bg-clip-text text-transparent">
                Welcome to Strata
            </h1>
            <p class="text-slate-400 text-sm mt-2">Please sign in to your workspace</p>
        </div>

        <!-- Dynamic Error Message Container -->
        <div id="error-alert" class="hidden mb-6 p-3 rounded-lg bg-red-500/10 border border-red-500/30 flex items-center justify-center">
            <svg class="w-5 h-5 text-red-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="error-message" class="text-red-500 text-sm font-semibold tracking-wide capitalize"></span>
        </div>
         
        <form action="LogInServlet" method="POST" class="space-y-6">

            <div>
                <label for="email" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Email
                </label>
                <input 
                    id="email" 
                    type="email" 
                    name="email" 
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all-300"
                    placeholder="Enter your email address"
                    required
                />
            </div>

            <div>
                <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">
                    Password
                </label>
                <input 
                    id="password" 
                    type="password" 
                    name="password" 
                    class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all-300"
                    placeholder="••••••••"
                    required
                /> 
            </div>

            <div class="flex flex-col gap-3 text-sm pt-2">
                <div>
                    <input 
                        type="reset" 
                        value="reset password" 
                        class="text-xs font-semibold tracking-wider uppercase text-blue-400 hover:text-blue-300 cursor-pointer bg-transparent border-0 p-0 focus:outline-none transition-colors"
                    />
                </div>
            </div>

            <div class="flex items-start gap-3 bg-slate-900/30 p-3 rounded-lg border border-slate-800/50 mt-4">
                <input 
                    id="tac-checkbox"
                    type="checkbox" 
                    name="TAC" 
                    value="Terms&Conditions" 
                    required
                    class="mt-1 h-4 w-4 rounded border-slate-700 bg-slate-900 text-blue-600 focus:ring-blue-500 focus:ring-offset-slate-900 transition-all-300"
                /> 
                <label for="tac-checkbox" class="text-xs text-slate-300 select-none cursor-pointer leading-relaxed">
                    I agree with <a href="terms-and-conditions.html" onclick="event.stopPropagation()" class="underline text-blue-400 hover:text-blue-300 decoration-blue-700 hover:decoration-blue-400 transition-colors">terms and conditions</a> <span class="text-red-500">*</span>
                </label>
            </div>

            <div class="pt-4 space-y-3">
                <input 
                    type="submit" 
                    value="log in" 
                    class="w-full py-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-lg shadow-lg shadow-blue-600/20 cursor-pointer transition-all-300 transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-950 uppercase tracking-wider text-xs"
                />
                
                <a 
                    href="signup.html" 
                    class="block w-full py-3 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold rounded-lg shadow-lg shadow-blue-600/20 cursor-pointer transition-all-300 transform active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-950 text-center uppercase tracking-wider text-xs"
                >
                    sign up
                </a>
            </div>
         
        </form>
    </div>

    <script>
        // Check if an error message exists in the URL after redirection from the Servlet
        document.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            
            if (error) {
                // Fetch the dynamic error div and text span
                const errorAlert = document.getElementById('error-alert');
                const errorMessage = document.getElementById('error-message');
                
                // Assign the servlet's error message to the page
                errorMessage.textContent = error;
                errorAlert.classList.remove('hidden'); // make the red error box visible
                
                // Clean the URL visually so the error parameter disappears if they refresh
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        });
    </script>

</body>
</html>
